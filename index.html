<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Beat Saber Web Chart Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="top-bar">
    <button id="load-json">読み込み</button>
    <button id="save-json">セーブ</button>

    <label>BPM: <input type="number" id="bpm" value="120"></label>
    <label>グリッド: <input type="number" id="grid-size" value="4"></label>

    <input type="file" id="audio-file" accept="audio/*">
</div>

<div id="main">
    <div id="grid"></div>

    <div id="right-panel">
        <h3>プロパティ</h3>
        <div id="prop-none">ノーツ未選択</div>
        <div id="prop-edit" style="display:none;">
            <label>秒: <input type="number" step="0.01" id="prop-time"></label>
            <label>レーン: <input type="number" id="prop-lane"></label>
            <label>手:
                <select id="prop-hand">
                    <option value="0">左手</option>
                    <option value="1">右手</option>
                </select>
            </label>
            <label>向き:
                <select id="prop-rot">
                    <option value="0">▲</option>
                    <option value="1">▶</option>
                    <option value="2">▼</option>
                    <option value="3">◀</option>
                </select>
            </label>
        </div>
    </div>
</div>

<canvas id="waveform"></canvas>
<canvas id="timeline"></canvas>

<script src="script.js"></script>
</body>
</html>
